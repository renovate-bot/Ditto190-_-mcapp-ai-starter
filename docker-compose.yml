    #         memory: 4G        # Reduce memory since GPU helps
    #   # =======================================
    #   devices:
    #     - "/dev/kfd"
    #     - "/dev/dri"

  ollama-pull-phi-cpu:
    profiles: [ "cpu" ]
    <<: *init-ollama
    depends_on:
      - ollama-cpu
