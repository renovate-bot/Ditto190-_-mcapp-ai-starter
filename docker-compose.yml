volumes:
  n8n_storage:
  postgres_storage:
  ollama_storage:
  qdrant_storage:


networks:
  demo:


x-n8n: &service-n8n
  image: n8nio/n8n:latest
  networks: [ 'demo' ]
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_USER=${POSTGRES_USER}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    - N8N_ENCRYPTION_KEY
    - N8N_USER_MANAGEMENT_JWT_SECRET
    - N8N_API_KEY
    - N8N_HOST
    - N8N_DISABLE_UI_SHARING
    - N8N_AI_ASSISTANT_BASE_URL
    - OLLAMA_HOST=${OLLAMA_HOST:-ollama:11434}
  env_file:
    - path: .env
      required: true

x-ollama: &service-ollama
  image: ollama/ollama:latest
  container_name: ollama
  networks: [ 'demo' ]
  restart: unless-stopped
  ports:
    - 11434:11434
  volumes:
    - ollama_storage:/root/.ollama

x-init-ollama: &init-ollama
  image: ollama/ollama:latest
  networks: [ 'demo' ]
  container_name: ollama-pull-phi
  volumes:
    - ollama_storage:/root/.ollama
  entrypoint: /bin/sh
  environment:
    - OLLAMA_HOST=ollama:11434
  command:
    - "-c"
    - "sleep 3; ollama pull phi:latest" # Lightweight ~2.7GB SLM (faster CPU inference)
    # Alternative: "ollama pull llama3.2" for larger model (~7GB, slower on CPU)

services:
  postgres:
    image: postgres:16-alpine
    hostname: postgres
    networks: [ 'demo' ]
    restart: unless-stopped
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    # === RESOURCE LIMITS (CPU/Memory caps to prevent runaway processes) ===
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    # ===================================================================
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}' ]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n-import:
    <<: *service-n8n
    hostname: n8n-import
    container_name: n8n-import
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        if [ -z "$(n8n list:workflow --onlyId)" ]; then
          n8n import:credentials --separate --input=/demo-data/credentials && \
          n8n import:workflow --separate --input=/demo-data/workflows
        else
          echo "Workflows exist, skipping import"
        fi
    volumes:
      - ./n8n/demo-data:/demo-data
    depends_on:
      postgres:
        condition: service_healthy

  n8n:
    <<: *service-n8n
    hostname: n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - 5678:5678
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./n8n/demo-data:/demo-data
      - ./shared:/data/shared
    # ===== RESOURCE LIMITS (Prevent n8n from consuming all CPU) =====
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
    # =================================================================
    depends_on:
      postgres:
        condition: service_healthy
      n8n-import:
        condition: service_completed_successfully

  qdrant:
    image: qdrant/qdrant
    hostname: qdrant
    container_name: qdrant
    networks: [ 'demo' ]
    restart: unless-stopped
    ports:
      - 6333:6333
    volumes:
      - qdrant_storage:/qdrant/storage
    # ===== RESOURCE LIMITS (RAG vector database) =====
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
    # ===================================================

  ollama-cpu:
    profiles: [ "cpu" ]
    <<: *service-ollama
    # ========== OLLAMA CPU RESOURCE LIMITS ==========
    # Limits Ollama to 4 cores + 8GB RAM to prevent 100% CPU spikes
    # Remove/adjust these limits if your system can handle more
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    # ===============================================

    # ╔════════════════════════════════════════════════════════════════╗
    # ║ GPU SUPPORT (NVIDIA) - UNCOMMENT BELOW TO ENABLE               ║
    # ║ Remove '#' from all lines of both commented sections below     ║
    # ║ (both the service AND the pull service), then run:             ║
    # ║   docker compose down                                          ║
    # ║   docker compose up --profile gpu-nvidia                       ║
    # ╚════════════════════════════════════════════════════════════════╝
