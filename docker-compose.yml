    #   # ===== GPU + CPU LIMITS (NVIDIA CUDA) =====
    #   deploy:
    #     resources:
    #       limits:
    #         cpus: '2'         # Use 2 CPU cores only (GPU does inference)
    #         memory: 4G        # Reduce memory since GPU helps
    #       reservations:
    #         devices:
    #           - driver: nvidia
    #             count: 1
    #             capabilities: [ gpu ]
    #   # ==========================================

    # ╔════════════════════════════════════════════════════════════════╗
    # ║ GPU SUPPORT (AMD/ROCm) - UNCOMMENT BELOW TO ENABLE             ║
    # ║ Remove '#' from all lines of both commented sections below     ║
    # ║ (both the service AND the pull service), then run:             ║
    # ║   docker compose down                                          ║
    # ║   docker compose up --profile gpu-amd                          ║
