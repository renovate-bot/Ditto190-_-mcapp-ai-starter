name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  # Only run when the workflow file itself changes on main branch
  push:
    branches: [main]
    paths:
      - .github/workflows/copilot-setup-steps.yml
  # DISABLED - run only on main branch or manual trigger
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` to be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Set up Python 3
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python dependencies (if present)
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          else
            echo "No requirements.txt found, skipping Python deps"
          fi

      - name: Verify basic toolchain
        run: |
          echo "Node: $(node --version || echo 'node not installed')"
          echo "npm: $(npm --version || echo 'npm not installed')"

      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install gh-aw extension
        uses: github/gh-aw-actions/setup-cli@73ae9ce231580f337133352d321d42b6bf54b6a9 # v0.66.1
        with:
          version: v0.66.1
      - name: Verify Python installation
        run: |
          echo "Python: $(python --version || echo 'python not installed')"
          echo "Pip: $(pip --version || echo 'pip not installed')"
