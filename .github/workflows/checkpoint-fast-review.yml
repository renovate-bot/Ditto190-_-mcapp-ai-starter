name: Checkpoint Fast Review

on:
  # DISABLED - run only via ChatOps or manual trigger
  # pull_request:
  #   branches: [main]
  #   types: [opened, reopened, synchronize, ready_for_review]
  # Allow ChatOps slash-command trigger from PR comments.
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: checkpoint-fast-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-review:
    if: |
      github.event_name != 'issue_comment' ||
      (
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/checkpoint-review')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (branch/PR)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Run checkpoint fast review
        run: bash scripts/checkpoint-fast-review.sh

      - name: Upload checkpoint review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkpoint-fast-review-${{ github.run_id }}
          path: .session-state/ci
          retention-days: 5

      - name: Comment when slash command was used
        if: always() && github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/checkpoint-review')
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `Checkpoint fast review triggered from slash command.\n\nRun: ${runUrl}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
