# Autofix CI workflow for Ditto190/mcapp-ai-starter
name: autofix.ci  # needed to securely identify the workflow

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: ["main"]

# NOTE: workflow needs write permissions to commit/push fixes or to open PRs.
permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Node / TypeScript / JavaScript / MDX
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install JS deps (npm / pnpm / yarn)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f pnpm-lock.yaml ]; then
            npm i -g pnpm
            pnpm install
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install
          else
            npm install
          fi

      - name: Run Prettier + ESLint autofixes (TS/JS/MDX)
        run: |
          # Format everything that Prettier supports (JS/TS/MDX/Markdown/etc)
          npx --yes prettier --write . || true
          # Run ESLint autofix for TS/JS files (if eslint config exists)
          if [ -f package.json ]; then
            npx --yes eslint --ext .ts,.tsx,.js,.jsx --fix . || true
          fi

      # Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python formatters/linters
        run: |
          python -m pip install --upgrade pip
          # Install formatters; if you have a requirements/poetry/pyproject, adapt this.
          python -m pip install ruff black isort || true

      - name: Run Python autofixers
        run: |
          # Ruff autofix if available
          if command -v ruff >/dev/null 2>&1; then
            ruff check . --fix || true
          fi
          # isort + black
          python -m isort . || true
          python -m black . || true

      # .NET / C#
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'

      - name: Run dotnet-format for C#
        run: |
          # Ensure dotnet-format is available
          dotnet tool install -g dotnet-format --version 6.* || true
          export PATH="$HOME/.dotnet/tools:$PATH"
          # Run dotnet format if there's a solution or project
          if ls *.sln 1> /dev/null 2>&1 || ls **/*.csproj 1> /dev/null 2>&1; then
            # try format; allow non-zero so other steps still run
            dotnet format || true
          fi

      # Commit / push the fixes (autofix-ci action)
      - name: Commit / push via autofix-ci
        uses: autofix-ci/action@7a166d7532b277f34e16238930461bf77f9d7ed8
        with:
          # Commit message used when autofix action pushes a fix commit.
          commit_message: "chore: autofix formatting & lint fixes"
          # Branch for PR created by autofix action (if it chooses to open PRs)
          pr_branch: "autofix-ci/patch"
          # You can add `exclude` or `only` inputs if desired (see action docs)
