name: Publish to npm

on:
  # Only run when a GitHub Release is published.
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run Prettier
        run: npm run prettier

  test:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

  publish:
    name: Publish core package to npm
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment: Release
    needs: [build, test]

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Determine npm tag
        id: npm-tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # Check if this is a beta release
          if [[ "$VERSION" == *"-beta"* ]]; then
            echo "tag=--tag beta" >> $GITHUB_OUTPUT
          # Check if this release is from a non-main branch (patch/maintenance release)
          elif [[ "${{ github.event.release.target_commitish }}" != "main" ]]; then
            # Use "release-X.Y" as tag for old branch releases
            MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
            echo "tag=--tag release-${MAJOR_MINOR}" >> $GITHUB_OUTPUT
          else
            echo "tag=" >> $GITHUB_OUTPUT
          fi

      - name: Publish package
        run: npm publish --provenance --access public ${{ steps.npm-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_SECRET }}

  publish-examples:
    name: Publish example packages to npm
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment: Release
    needs: [publish]

    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        example:
          - basic-server-preact
          - basic-server-react
          - basic-server-solid
          - basic-server-svelte
          - basic-server-vanillajs
          - basic-server-vue
          - budget-allocator-server
          - cohort-heatmap-server
          - customer-segmentation-server
          - debug-server
          - map-server
          - pdf-server
          - scenario-modeler-server
          - shadertoy-server
          - sheet-music-server
          - system-monitor-server
          - threejs-server
          - transcript-server
          - video-resource-server
          - wiki-explorer-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build example
        run: npm run build --workspace examples/${{ matrix.example }}

      - name: Publish example
        run: npm publish --workspace examples/${{ matrix.example }} --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_SECRET }}

  publish-mcpb:
    name: Build & upload MCPB bundle
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment: Release
    needs: [publish-examples]

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build pdf-server
        run: npm run build --workspace examples/pdf-server

      - name: Pack MCPB bundle
        run: npx -y @anthropic-ai/mcpb pack
        working-directory: examples/pdf-server

      - name: Upload MCPB to release
        run: gh release upload "${{ github.event.release.tag_name }}" examples/pdf-server/*.mcpb --clobber
        env:
          GH_TOKEN: ${{ github.token }}
