name: A.D.A.M. Playground

on:
  # Run after code actually lands on main (including merged PRs),
  # but only when relevant A.D.A.M. files change.
  push:
    branches: [main]
    paths:
      - "examples/adam-server/**"
      - "scripts/scaffold-agent.mjs"
      - ".github/workflows/adam-playground.yml"

  # Allow manual runs from the Actions tab with optional inputs.
  workflow_dispatch:
    inputs:
      agent_name:
        description: "Name of agent to scaffold"
        required: false
        default: "Playground Agent"
      agent_capabilities:
        description: "Comma-separated capabilities"
        required: false
        default: "sensing,seizing"

permissions:
  contents: read

jobs:
  build-adam:
    name: Build A.D.A.M. Server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build SDK
        run: npm run build

      - name: Build A.D.A.M. server
        run: npm run --workspace examples/adam-server build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: adam-server-dist
          path: examples/adam-server/dist/
          retention-days: 7

  scaffold-agent:
    name: Scaffold Agent (dry-run)
    runs-on: ubuntu-latest
    needs: build-adam

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run scaffold-agent helper
        run: |
          node scripts/scaffold-agent.mjs \
            --name "${{ github.event.inputs.agent_name || 'CI Test Agent' }}" \
            --capabilities "${{ github.event.inputs.agent_capabilities || 'sensing,learning' }}" \
            --description "Auto-generated by A.D.A.M. CI scaffold" \
            --output json

      - name: Scaffold TypeScript snippet
        run: |
          node scripts/scaffold-agent.mjs \
            --name "${{ github.event.inputs.agent_name || 'CI Test Agent' }}" \
            --capabilities "${{ github.event.inputs.agent_capabilities || 'sensing,learning' }}" \
            --output ts

  validate-knowledge-pipeline:
    name: Validate ETL Pipeline Config
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate server TypeScript
        run: |
          npm install
          cd examples/adam-server
          npx tsc --noEmit -p tsconfig.json
          npx tsc --noEmit -p tsconfig.server.json
